<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YouTube Shorts Uploader Codex</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>YouTube Shorts Uploader Codex</h1>
        <p id="generatedAt">베타 목업 리포트를 불러오는 중</p>
      </div>
      <div class="auth" id="authStatus"></div>
    </header>

    <main>
      <section class="metrics" id="metrics"></section>

      <section class="trigger-panel" aria-label="upload trigger">
        <div class="trigger-controls">
          <label>
            <span>날짜</span>
            <input id="triggerDate" type="text" inputmode="numeric" maxlength="8" />
          </label>
          <label class="check">
            <input id="allowReview" type="checkbox" />
            <span>검토 포함</span>
          </label>
          <button id="setupFolders" class="action secondary" type="button">폴더 확인</button>
          <button id="writeTemplates" class="action secondary" type="button">JSON 양식 배포</button>
          <button id="refreshScan" class="action secondary" type="button">스캔 갱신</button>
          <button id="previewTrigger" class="action primary" type="button">미리보기</button>
          <button id="executeTrigger" class="action danger" type="button">Private 업로드</button>
        </div>
        <div id="triggerResult" class="trigger-result" aria-live="polite"></div>
      </section>

      <section class="toolbar">
        <div class="toolbar-groups">
          <div class="source-tabs" role="tablist" aria-label="source filters">
            <button class="source-tab active" data-source="drive">오늘 Drive</button>
            <button class="source-tab" data-source="all">전체 스캔</button>
          </div>
          <div class="tabs" role="tablist" aria-label="filters">
            <button class="tab active" data-filter="all">전체</button>
            <button class="tab" data-filter="review">검토 필요</button>
            <button class="tab" data-filter="ready">업로드 가능</button>
            <button class="tab" data-filter="fail">영상 실패</button>
            <button class="tab" data-filter="duplicate">중복</button>
          </div>
        </div>
        <input id="search" type="search" placeholder="제목, 프로젝트, 태그 검색" />
      </section>

      <section class="grid" id="candidateGrid"></section>
    </main>

    <script src="./report-data.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
